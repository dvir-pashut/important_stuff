name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Site (Generate index.html)
        run: python3 build_site.py

      - name: Encrypt index.html
        run: |
          # Install staticrypt
          npm install -g staticrypt
          
          # Encrypt the file. Password should be in repository secrets or passed here.
          # User mentioned "1234561" as password.
          # output file will be 'encrypted/index.html' by default or we can specify.
          # We want the deployed index.html to be the encrypted one.
          
          npx staticrypt index.html -p 1234561 -o index_encrypted.html
          
          # Replace original with encrypted
          mv index_encrypted.html index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
